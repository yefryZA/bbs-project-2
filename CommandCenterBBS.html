<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command Center PT. BBS</title>
    <style>
        :root {
            --bg-dark: #050b14;
            --neon-blue: #00d4ff;
            --neon-green: #00ffcc;
            --glass-bg: rgba(10, 25, 47, 0.6);
            --glass-border: rgba(0, 212, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #0a192f 0%, var(--bg-dark) 100%);
            color: white;
            height: 100vh;
            overflow: hidden; 
        }

        /* --- WELCOME SCREEN --- */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #001f3f 0%, #050b14 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            text-align: center;
            transition: opacity 0.8s ease;
        }

        #welcome-screen img {
            height: 100px;
            margin-bottom: 20px;
            filter: drop-shadow(0px 0px 15px var(--neon-blue));
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* --- DASHBOARD AREA --- */
        #main-dashboard {
            display: none;
            flex-direction: column;
            height: 100vh;
            padding: 15px;
        }

        .header-cc {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 21, 40, 0.8);
            border: 1px solid var(--glass-border);
            border-top: 3px solid var(--neon-blue);
            padding: 10px 25px;
            border-radius: 10px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .brand-area { display: flex; align-items: center; gap: 15px; }
        .brand-area img { height: 40px; }
        .header-cc h1 { font-size: 20px; letter-spacing: 2px; text-shadow: 0 0 10px var(--neon-blue); }

        .jam-digital { font-size: 24px; font-weight: bold; color: var(--neon-green); text-align: right; }
        .tgl-digital { font-size: 11px; color: #888; text-align: right; }

        /* --- RUNNING TEXT --- */
        .running-text-container {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 5px;
            padding: 5px;
            margin-bottom: 10px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .running-text {
            display: inline-block;
            white-space: nowrap;
            color: #ffaa00;
            font-weight: bold;
            font-size: 14px;
            animation: scroll-left 30s linear infinite;
        }

        @keyframes scroll-left {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        /* --- GRID 1 BARIS (4 MONITOR SEJAJAR) --- */
        .grid-cc {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 Kolom Berjejer */
            gap: 12px;
            flex-grow: 1; /* Ambil sisa ruang ke bawah */
            height: 0;    /* Maksa isi buat stretch */
        }

        .monitor-box {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .monitor-header {
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .monitor-title { font-size: 11px; font-weight: bold; color: #00d4ff; letter-spacing: 1px; }

        .monitor-content {
            flex-grow: 1;
            background: #fff; /* Background putih agar dashboard proyek terlihat jelas */
        }

        iframe { width: 100%; height: 100%; border: none; }

       .dot-blink {
            width: 10px;           /* Ukuran digedein dikit biar jelas */
            height: 10px;
            background: #00ff00;   /* Hijau Murni (Lime) */
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00; /* Efek Sinar LED */
            animation: blinker 1s infinite;
        }

        @keyframes blinker {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); } /* Jangan sampai nol biar gak hilang total */
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="welcome-screen" onclick="masukCommandCenter()">
        <img src="https://raw.githubusercontent.com/yefryZA/PT.BBS/main/logo.png" alt="Logo PT BBS">
        <h1>COMMAND CENTER PT. BBS</h1>
        <p>[ KLIK UNTUK AKTIFKAN 4 MONITORING ]</p>
    </div>

    <div id="main-dashboard">
        <header class="header-cc">
            <div class="brand-area">
                <img src="https://raw.githubusercontent.com/yefryZA/PT.BBS/main/logo.png" alt="LOGO BBS">
                <h1>PT. BERKAH BAJA STEEL <span style="font-size: 12px; opacity: 0.6;">| LIVE SYSTEM</span></h1>
            </div>
            <div class="clock-area">
                <div id="jam" class="jam-digital">00:00:00</div>
                <div id="tgl" class="tgl-digital">...</div>
            </div>
        </header>

        <div class="running-text-container">
            <div class="running-text">
                ⚠️ MONITORING SYSTEM ACTIVE ‖ PROJECT PT. NAS - LOSARANG ‖ PROJECT PT. NAS - TOLL JAPEK II ‖ PROJECT PT. NAS - VINFAST ‖ SYSTEM BY_YEFRY ZA.
            </div>
        </div>

        <div class="grid-cc">
            <div class="monitor-box">
                <div class="monitor-header">
                    <span class="monitor-title">NAS - VINFAST</span>
                    <span class="dot-blink"></span>
                </div>
                <div class="monitor-content">
                    <iframe src="https://yefryza.github.io/Project_BBS/ProjectJapek.html"></iframe>
                </div>
            </div>

            <div class="monitor-box">
                <div class="monitor-header">
                    <span class="monitor-title">RT SAHRIL</span>
                    <span class="dot-blink"></span>
                </div>
                <div class="monitor-content">
                    <iframe src="https://yefryza.github.io/Project_BBS/ProjectLosarang.html"></iframe>
                </div>
            </div>

            <div class="monitor-box">
                <div class="monitor-header">
                    <span class="monitor-title">Bp. BURHAN</span>
                    <span class="dot-blink"></span>
                </div>
                <div class="monitor-content">
                    <iframe src="https://yefryza.github.io/Project_BBS/tongkang1.html"></iframe>
                </div>
            </div>

            <div class="monitor-box">
                <div class="monitor-header">
                    <span class="monitor-title">NAS - H K</span>
                    <span class="dot-blink"></span>
                </div>
                <div class="monitor-content">
                    <iframe src="https://yefryza.github.io/Project_BBS/tongkang2.html"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        function updateJam() {
            const sekarang = new Date();
            document.getElementById('jam').innerText = sekarang.toLocaleTimeString('en-GB');
            const opsi = { weekday: 'long', day: '2-digit', month: 'short', year: 'numeric' };
            document.getElementById('tgl').innerText = sekarang.toLocaleDateString('id-ID', opsi).toUpperCase();
        }
        setInterval(updateJam, 1000);
        updateJam();

        function masukCommandCenter() {
            let elem = document.documentElement; 
            if (elem.requestFullscreen) { elem.requestFullscreen(); } 
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }

            document.getElementById('welcome-screen').style.opacity = '0'; 
            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none'; 
                document.getElementById('main-dashboard').style.display = 'flex'; 
            }, 800); 
        }
    </script>
</body>
</html>
