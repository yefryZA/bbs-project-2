<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIEWER - KAS BERSAMA</title>
    <style>
        :root { --dark: #155e08; --light-dark: #112240; --gold: #ffb400; --green: #2ecc71; --red: #e74c3c; --text: #ccd6f6; --slate: #8892b0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        
        .card-saldo { background: var(--light-dark); padding: 30px 20px; border-radius: 25px; text-align: center; border: 1px solid rgba(255, 180, 0, 0.2); margin-bottom: 25px; border-top: 5px solid var(--gold); }
        
        /* Area Rahasia BBS */
        #admin-area { display: none; background: #1d3557; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--green); text-align: center; }
        
        .saldo-amount { font-size: 38px; font-weight: bold; color: var(--gold); margin: 10px 0; }
        .saldo-admin { font-size: 28px; font-weight: bold; color: var(--green); }
        
        .list-container { background: var(--light-dark); border-radius: 20px; padding: 15px; border: 1px solid #233554; }
        .item-kas { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #233554; }
        .item-ket { font-size: 13px; font-weight: bold; }
        .item-tgl { font-size: 10px; color: var(--slate); }
        .nom-in { color: var(--green); }
        .nom-out { color: var(--red); }
        .admin-only { display: none; font-size: 9px; color: var(--green); margin-top: 4px; font-style: italic; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center; color:var(--gold);">MONITORING KAS</h2>

    <div id="admin-area">
        <div style="font-size: 10px; color: var(--green); font-weight: bold;">TOTAL SALDO ASLI (INTERNAL BBS)</div>
        <div class="saldo-admin" id="total-bbs">RP 0</div>
    </div>

    <div class="card-saldo">
        <div style="font-size: 12px; color: var(--slate);">SALDO SAAT INI</div>
        <div class="saldo-amount" id="total-rekanan">RP 0</div>
    </div>

    <div style="font-weight:bold; margin-bottom:10px; color:var(--gold);">RINCIAN TRANSAKSI</div>
    <div class="list-container" id="list-transaksi">
        <p style="text-align:center; color:var(--slate);">Memuat data...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA_wvEsCCOEjiwxui7_pdOrG8-xMBCw3mw",
        authDomain: "barcode-warung-81e97.firebaseapp.com",
        databaseURL: "https://barcode-warung-81e97-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "barcode-warung-81e97",
        appId: "1:1089837830503:web:410644c17a04314e37dfc2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const pathKas = `SALDO_BERSAMA`;

    onValue(ref(db, pathKas), (snap) => {
    let totalRekanan = 0; 
    let html = "";
    const data = snap.val();

    if(data) {
        Object.values(data).reverse().forEach(item => {
            const isIn = item.tipe === 'IN';
            const nomRekanan = item.nominal_rekanan || item.nominal || 0;

            totalRekanan += isIn ? nomRekanan : -nomRekanan;

            // FITUR UTAMA: Logika tombol ikon foto nota otomatis
            let tombolNotaHtml = "";
            if (!isIn && item.foto_nota) {
                tombolNotaHtml = `
                    <a href="${item.foto_nota}" target="_blank" 
                       style="display: inline-block; background-color: #34a853; color: white !important; font-size: 10px; font-weight: bold; text-decoration: none; padding: 2px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle;">
                       📄 Nota
                    </a>
                `;
            }

            html += `
            <div class="item-kas" style="display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333;">
                <div>
                    <div class="item-ket" style="font-weight: bold;">
                        ${item.keterangan} ${tombolNotaHtml}
                    </div>
                    <div class="item-tgl" style="font-size: 11px; color: var(--slate); margin-top: 4px;">
                        ${item.tgl} | ${item.jam}
                    </div>
                </div>
                <div style="text-align:right">
                    <div style="font-weight:bold" class="${isIn?'nom-in':'nom-out'}">
                        ${isIn?'+':'-'}${nomRekanan.toLocaleString('id-ID')}
                    </div>
                </div>
            </div>`;
        });
    }
    
    // Tampilkan total saldo murni rekanan dan daftar transaksinya
    document.getElementById('total-rekanan').innerText = "RP " + totalRekanan.toLocaleString('id-ID');
    document.getElementById('list-transaksi').innerHTML = html || "<p style='text-align:center; color:var(--slate); padding:20px;'>Belum ada riwayat transaksi</p>";
});
</script>
</body>
</html>
