<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - INPUT KAS BBS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --dark: #0a192f; --light-dark: #112240; --gold: #ffb400; --green: #2ecc71; --red: #e74c3c; --text: #ccd6f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; }
        .btn { width: 100%; padding: 20px; border: none; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; margin-bottom: 15px; font-size: 16px; }
        .bg-green { background: var(--green); }
        .bg-red { background: var(--red); }
        .btn-pdf { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); padding: 20px; }
        .modal-content { background: var(--light-dark); padding: 25px; border-radius: 20px; border: 1px solid var(--gold); margin-top: 50px; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: var(--dark); border: 1px solid #233554; color: white; border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body>
<div class="container">
    <h2 style="text-align:center; color:var(--gold);">BBS ADMIN PANEL</h2>
    <button class="btn bg-green" onclick="openModal('IN')">➕ TAMBAH SALDO</button>
    <button class="btn bg-red" onclick="openModal('OUT')">💸 INPUT PENGELUARAN</button>
    <button class="btn btn-pdf" onclick="generatePDF()">📄 DOWNLOAD LAPORAN PDF</button>
</div>

<div id="modal-kas" class="modal">
    <div class="modal-content">
        <h3 id="modal-title" style="color:var(--gold)">INPUT DATA</h3>
        <input type="text" id="kas-ket" placeholder="Keterangan Transaksi">
        
        <label style="font-size: 11px; color: var(--slate);">Nominal (Otomatis Titik)</label>
        <input type="text" id="kas-nom" placeholder="0" oninput="formatRupiah(this)">
        
        <input type="hidden" id="kas-tipe">
        <button class="btn bg-green" onclick="simpan()">SIMPAN DATA</button>
        <button class="btn" onclick="closeModal()" style="color: black !important; background-color: #f1f1f1;">BATAL</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, push, get, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA_wvEsCCOEjiwxui7_pdOrG8-xMBCw3mw",
        authDomain: "barcode-warung-81e97.firebaseapp.com",
        databaseURL: "https://barcode-warung-81e97-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "barcode-warung-81e97",
        appId: "1:1089837830503:web:410644c17a04314e37dfc2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const pathKas = `BUKU_KAS`;

    window.openModal = (t) => {
        document.getElementById('kas-tipe').value = t;
        document.getElementById('modal-title').innerText = t === 'IN' ? "TAMBAH SALDO" : "PENGELUARAN";
        document.getElementById('modal-kas').style.display = 'block';
    }
    window.closeModal = () => document.getElementById('modal-kas').style.display = 'none';

    window.simpan = async () => {
        const k = document.getElementById('kas-ket').value;
        const n = Number(document.getElementById('kas-nom').value);
        const t = document.getElementById('kas-tipe').value;
        if(!k || !n) return alert("Isi Bro!");
        await push(ref(db, pathKas), {
            tgl: new Date().toLocaleDateString('id-ID'),
            jam: new Date().toLocaleTimeString('id-ID'),
            keterangan: k.toUpperCase(),
            nominal: n,
            tipe: t,
            ts: serverTimestamp()
        });
        alert("Berhasil!"); closeModal();
    }

    window.generatePDF = async () => {
    const snap = await get(ref(db, pathKas));
    if(!snap.exists()) return alert("Data Kosong!");
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // Header Laporan
    doc.setFontSize(16);
    doc.text("LAPORAN KAS PT. BBS", 105, 15, { align: "center" });
    doc.setFontSize(10);
    doc.text(`Dicetak pada: ${new Date().toLocaleString('id-ID')}`, 14, 22);

    let s = 0;
    const body = Object.values(snap.val()).map((v, i) => {
        s += v.tipe === 'IN' ? v.nominal : -v.nominal;
        return [
            i + 1, 
            v.tgl, 
            v.keterangan, 
            v.tipe === 'IN' ? v.nominal.toLocaleString('id-ID') : '-', 
            v.tipe === 'OUT' ? v.nominal.toLocaleString('id-ID') : '-', 
            s.toLocaleString('id-ID')
        ];
    });

    doc.autoTable({ 
        head: [['NO', 'TGL', 'KETERANGAN', 'IN (Rp)', 'OUT (Rp)', 'SALDO (Rp)']], 
        body: body, 
        startY: 28,
        theme: 'grid',
        headStyles: { fillColor: [255, 180, 0], textColor: [0, 0, 0] }
    });

    // --- BAGIAN TANDA TANGAN ---
    const finalY = doc.lastAutoTable.finalY + 20; 
    const pageWidth = doc.internal.pageSize.getWidth();
    const pageHeight = doc.internal.pageSize.getHeight();
    const rightPos = pageWidth - 60; 

    doc.setFontSize(10);
    doc.setFont("helvetica", "normal");
    doc.text("Dibuat oleh,", rightPos, finalY);
    
    // Nama Manager
    doc.setFont("helvetica", "bold");
    doc.text("Yefry ZA.", rightPos, finalY + 25); 
    
    // Garis Bawah Nama (Panjang disesuaikan agar tidak kepanjangan)
    const textWidth = doc.getTextWidth("Yefry ZA."); // Menghitung lebar teks nama
    doc.line(rightPos, finalY + 26, rightPos + textWidth, finalY + 26);

    // Jabatan
    doc.setFont("helvetica", "normal");
    doc.text("Manager", rightPos, finalY + 31);

    // --- FOOTER DI BAWAH KERTAS ---
 // --- FOOTER DI BAWAH KERTAS ---
    doc.setFontSize(8);
    doc.setTextColor(150, 150, 150); // Warna abu-abu samar
    
    // Set font ke helvetica dan gaya italic (miring)
    doc.setFont("helvetica", "italic"); 
    
    doc.text("Laporan ini dibuat secara otomatis oleh system digital PT. BBS", pageWidth / 2, pageHeight - 10, { align: "center" });
    // Simpan PDF
    doc.save(`Laporan_Kas_BBS_${new Date().getTime()}.pdf`);
}

    // Fungsi Ajaib Penambah Titik Otomatis
window.formatRupiah = (objek) => {
    let angka = objek.value.replace(/[^,\d]/g, "").toString();
    let split = angka.split(",");
    let sisa = split[0].length % 3;
    let rupiah = split[0].substr(0, sisa);
    let ribuan = split[0].substr(sisa).match(/\d{3}/gi);

    if (ribuan) {
        let separator = sisa ? "." : "";
        rupiah += separator + ribuan.join(".");
    }

    rupiah = split[1] != undefined ? rupiah + "," + split[1] : rupiah;
    objek.value = rupiah;
}

// Update fungsi simpan (karena nominal sekarang ada titiknya, harus dibersihkan dulu sebelum kirim ke Firebase)
window.simpan = async () => {
    const k = document.getElementById('kas-ket').value;
    const nRaw = document.getElementById('kas-nom').value;
    const t = document.getElementById('kas-tipe').value;
    
    // Bersihkan titik agar jadi angka murni lagi (misal: "50.000" jadi 50000)
    const n = Number(nRaw.replace(/\./g, ''));

    if(!k || !n) return alert("Isi Keterangan & Nominal dulu Bang!");

    try {
        await push(ref(db, pathKas), {
            tgl: new Date().toLocaleDateString('id-ID'),
            jam: new Date().toLocaleTimeString('id-ID'),
            keterangan: k.toUpperCase(),
            nominal: n,
            tipe: t,
            ts: serverTimestamp()
        });
        alert("Data Tersimpan: Rp " + n.toLocaleString('id-ID')); 
        closeModal();
    } catch (e) { alert("Gagal: " + e.message); }
}

</script>
</body>
</html>
