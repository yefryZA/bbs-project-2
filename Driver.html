<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBS DRIVER</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0a192f; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #112240; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; border: 1px solid #233554; }
        .logo { width: 100px; height: auto; margin-bottom: 15px; }
        h2 { margin: 0 0 5px 0; font-size: 20px; color: #64ffda; }
        p { margin: 0 0 20px 0; font-size: 12px; color: #8892b0; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 12px; margin-bottom: 5px; color: #64ffda; font-weight: bold; }
       input { 
    width: 100%; 
    padding: 15px; /* Ditambah biar box input lebih tebal & empuk ditekan */
    background: #0a192f; 
    border: 2px solid #233554; /* Garis border dipertebal */
    border-radius: 8px; 
    color: #fff; 
    outline: none;
    
    /* 🎯 LOGIKA AGAR FONT ARIAL BLACK GEDE & OTOMATIS KAPITAL */
    font-family: 'Arial Black', 'Arial Bold', sans-serif;
    font-size: 22px; /* Ukuran text diperbesar drastis */
    text-transform: uppercase; /* Paksa visual input jadi HURUF BESAR SEMUA */
    letter-spacing: 1px; /* Jarak antar huruf diperlebar sedikit biar mudah dibaca */
    text-align: center; /* Text rata tengah biar makin rapi seperti plat nomor asli */
}
input:focus { 
    border-color: #64ffda; 
    background: #112240; /* Berubah agak terang pas diklik biar sopir tahu kolom mana yg aktif */
}
/* Mengubah warna teks contoh (placeholder) agar tetap proporsional */
input::placeholder {
    font-family: 'Segoe UI', sans-serif; /* Teks contoh pakai font biasa biar gak kepenuhan */
    font-size: 14px; 
    color: #4c5773;
    letter-spacing: 0px;
}
        button { width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-start { background: #64ffda; color: #0a192f; }
        .btn-start:hover { background: #52d1b2; }
        .btn-stop { background: #ff4d4d; color: #fff; }
        .status-box { background: #233554; padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 13px; border-left: 4px solid #64ffda; text-align: left; display: none; }
        .pulse { display: inline-block; width: 10px; height: 10px; background: #64ffda; border-radius: 50%; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body>

<div class="card">
    <img src="https://raw.githubusercontent.com/yefryZA/PT.BBS/main/logo.png" class="logo" alt="Logo BBS">
    <h2>PT. BERKAH BAJA STEEL</h2>
    <p>Project Pengiriman Pasir C.04 Losarang</p>

    <div id="form-area">
        <div class="form-group">
            <label>PLAT NOMOR ARMADA</label>
            <input type="text" id="plat" placeholder="Contoh: E 1234 XF" autocomplete="off">
        </div>
        <div class="form-group">
            <label>NAMA SOPIR</label>
            <input type="text" id="sopir" placeholder="Nama Lengkap Sopir" autocomplete="off">
        </div>
        <button class="btn-start" onclick="mulaiTracking()">MULAI PERJALANAN</button>
    </div>

   <div id="lock-area" style="display: none;">
        <div class="status-box" id="status-box" style="display: block;">
            <span class="pulse"></span> <b>SELAMAT BEKERJA HARI INI</b><br>
            <span style="color:#8892b0; font-size:11px;">HATI HATI DIJALAN KESELAMATAN YANG UTAMA</span>
        </div>
        
        <div class="form-group" style="margin-top: 20px;">
            <label>PIN ADMIN BBS</label>
            <input type="password" id="pin-input" placeholder="Masukkan PIN untuk Berhenti" pattern="\d*" inputmode="numeric" style="text-align: center; font-size: 18px; letter-spacing: 5px;">
        </div>
        <button class="btn-stop" onclick="stopTracking()">KELUAR</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Konfigurasi Firebase PT. BBS
    const firebaseConfig = { 
        apiKey: "AIzaSyAfeLTKRQ66tjZjAt7tg6KcrWhtmv0y3fo", 
        databaseURL: "https://berkah-baja-steel-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "berkah-baja-steel" 
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbKey = "BBS_PROYEK_SATOE"; // Node Utama Database Proyek Losarang

    let gpsInterval = null;
    let currentIdTransaksi = "";
    let wakeLock = null;

    // 🔒 FUNGSI AWAL: Memaksa sistem HP tetap melek biar GPS tidak tidur
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('🔒 HP Dipaksa Melek, GPS Anti-Mati!');
            }
        } catch (err) {
            console.error('❌ Gagal mengunci sistem melek:', err);
        }
    }

    // Jalankan sistem anti-tidur saat halaman dimuat atau dibuka kembali
    window.addEventListener('load', requestWakeLock);
    document.addEventListener('visibilitychange', () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            requestWakeLock();
        }
    });

    // 🚀 DAFTARKAN SERVICE WORKER FISIK (Hanya yang asli sw.js agar anti-blokir Chrome)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js', { scope: './' })
                .then((reg) => console.log('🚀 PWA Driver Resmi Aktif!', reg))
                .catch((err) => console.error('❌ Eror PWA Driver:', err));
        });
    }

    // Cek status lokal saat aplikasi dibuka (Kunci Anti Amnesia)
    window.onload = function() {
        const savedId = localStorage.getItem('bbs_active_id');
        const savedPlat = localStorage.getItem('bbs_active_plat');
        const savedSopir = localStorage.getItem('bbs_active_sopir');
        
        if (savedId && savedPlat) {
            currentIdTransaksi = savedId;
            document.getElementById('plat').value = savedPlat;
            document.getElementById('sopir').value = savedSopir;
            
            document.getElementById('form-area').style.display = 'none';
            document.getElementById('lock-area').style.display = 'block';
            
            aktifkanMesinGPS();
        }
    }

    // FUNGSI: MULAI PERJALANAN 
    window.mulaiTracking = async function() {
        const plat = document.getElementById('plat').value.trim().toUpperCase();
        const sopir = document.getElementById('sopir').value.trim();

        if (!plat || !sopir) {
            alert("❌ Harap isi Plat Nomor dan Nama Sopir lebih dulu!");
            return;
        }

        if (!navigator.geolocation) {
            alert("❌ HP ini tidak mendukung sensor GPS!");
            return;
        }

        currentIdTransaksi = "TRACK-" + Date.now();

        localStorage.setItem('bbs_active_id', currentIdTransaksi);
        localStorage.setItem('bbs_active_plat', plat);
        localStorage.setItem('bbs_active_sopir', sopir);

        document.getElementById('form-area').style.display = 'none';
        document.getElementById('lock-area').style.display = 'block';

        await set(ref(db, `bbs_tracking/${dbKey}/${currentIdTransaksi}`), {
            id_track: currentIdTransaksi,
            plat_nomor: plat,
            nama_sopir: sopir,
            waktu_mulai: new Date().toISOString(),
            status_perjalanan: "MENGIRIM_POSISI",
            lat: 0,
            lng: 0
        });

        aktifkanMesinGPS();
    }

    // FUNGSI: RADAR UTAMA GPS (Sudah tersisip jembatan ke Service Worker latar belakang)
    function aktifkanMesinGPS() {
        if (!navigator.geolocation) {
            return;
        }

        // Panggil paksa sistem melek
        requestWakeLock();

        gpsInterval = navigator.geolocation.watchPosition(async (position) => {
            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;

            // 1. Kiriman Utama (Saat aplikasi dibuka melek)
            await update(ref(db, `bbs_tracking/${dbKey}/${currentIdTransaksi}`), {
                lat: latitude,
                lng: longitude,
                waktu_update: new Date().toISOString()
            });

            // 2. JEMBATAN SILUMAN (Melempar koordinat asli ke sw.js saat HP dimasukkan kantong)
            if (navigator.serviceWorker && navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({
                    type: 'TRACK_GPS_BACKGROUND',
                    latitude: latitude,
                    longitude: longitude,
                    dbPath: `bbs_tracking/${dbKey}/${currentIdTransaksi}`
                });
            }

        }, (error) => {
            console.error("Error GPS:", error);
        }, {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
        });
    }
    
    // FUNGSI: TOMBOL SELESAI (Kunci Bongkar via PIN Dashboard)
    window.stopTracking = async function() {
        const inputPin = document.getElementById('pin-input').value.trim();

        if (!inputPin) {
            alert("❌ Masukkan PIN Kunci Bongkar terlebih dahulu!");
            return;
        }

        try {
            const snapshot = await get(ref(db, `bbs_config/${dbKey}/pin_bongkar`));
            const pinSistem = snapshot.exists() ? snapshot.val().toString().trim() : "2026";

            if (inputPin !== pinSistem) {
                alert("❌ PIN SALAH! Koordinat Anda tetap dipantau. Silakan minta PIN ke Petugas Pos Bongkar.");
                document.getElementById('pin-input').value = "";
                return;
            }

            // Hentikan radar GPS internal
            if (gpsInterval) {
                navigator.geolocation.clearWatch(gpsInterval);
            }

            await update(ref(db, `bbs_tracking/${dbKey}/${currentIdTransaksi}`), {
                status_perjalanan: "SELESAI_BONGKAR",
                waktu_selesai: new Date().toISOString()
            });

            localStorage.clear();

            alert("✅ PERJALANAN SELESAI! Terima kasih Pak Sopir, amanah sudah sampai tujuan.");
            location.reload();

        } catch (error) {
            console.error("Gagal membaca PIN dari server:", error);
            alert("❌ KONEKSI ERROR: Gagal memvalidasi PIN ke server. Coba lagi!");
        }
    }
</script>
</body>
</html>
